name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - run: cargo build --release --package lint

      - name: Upload binary
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/resolve-lint
